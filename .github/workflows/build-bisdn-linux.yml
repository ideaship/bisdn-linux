name: Build BISDN Linux

on:
  push:
    branches:
      - rl_build
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Free disks space
        run: |
          echo --- df -h
          df -h /
          sudo du -msc /usr/local/lib/android /usr/share/dotnet /opt/ghc "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo --- df -h
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install kas

      - name: Inspect build host
        run: |
          echo --- df -h
          df -h
          echo --- free -h
          free -h
          echo --- lscpu
          lscpu

      - name: Cache BitBake directories
        uses: actions/cache@v4
        with:
          path: |
            build/sstate-cache
          key: ${{ runner.os }}-bitbake-${{ hashFiles('**/bisdn-linux.yaml') }}
          restore-keys: |
            ${{ runner.os }}-bitbake-

      - name: Build BISDN Linux
        run: |
          KAS_TARGET=minimal kas-container build bisdn-linux.yaml:rm-work.yaml
          echo --- df -h
          df -h

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bisdn-linux-image
          path: build/tmp/deploy/images/
